name: Release

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build plugin
        run: npm run build
        
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir ${{ github.workspace }}/release
          cp main.js manifest.json ${{ github.workspace }}/release
          
      - name: Upload release artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release
          path: ${{ github.workspace }}/release
          
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            ${{ github.workspace }}/release/main.js
            ${{ github.workspace }}/release/manifest.json 